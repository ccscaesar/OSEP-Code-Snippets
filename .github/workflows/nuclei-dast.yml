name: Nuclei YWH DAST

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set current date
        run: echo "SCAN_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.21'
          cache: false

      - name: Install ProjectDiscovery Tools
        run: |
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest

      - name: Update Nuclei Templates
        run: nuclei -update-templates -silent

      - name: Add Swap Space
        run: |
          if ! swapon --show | grep -q '/swapfile'; then
            if [ -f /swapfile ]; then
              sudo swapoff /swapfile 2>/dev/null || true
              sudo rm -f /swapfile
            fi
            sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=none
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          echo "Swap status:"; swapon --show

      - name: Fetch & Filter Targets
        run: |
          curl -s https://raw.githubusercontent.com/rix4uni/scope/main/data/Yeswehack/yeswehack_inscope.txt \
            | httpx -silent -fc 404 -o alive_targets.txt

      - name: DAST Nuclei Scan
        timeout-minutes: 90
        run: |
          nuclei -l alive_targets.txt \
            -dast \
            -severity low,medium,high,critical \
            -etags dos,intrusive \
            -rl 30 \
            -c 10 \
            -stats \
            -o nuclei_dast_${{ env.SCAN_DATE }}.txt

      - name: Send Telegram Notification
        if: always()
        run: |
          DAST_FILE="nuclei_dast_${{ env.SCAN_DATE }}.txt"

          if [ -s "$DAST_FILE" ]; then
            DAST_COUNT=$(grep -c "\[" "$DAST_FILE" 2>/dev/null || echo 0)
            MESSAGE="🚨 *Nuclei YWH DAST Scan* 🚨%0A🔍 DAST Findings: $DAST_COUNT vulnerabilities"

            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MESSAGE&parse_mode=Markdown"

            curl -s \
              -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F "document=@$DAST_FILE" \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"
          fi

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuclei-dast-${{ env.SCAN_DATE }}
          path: nuclei_dast_${{ env.SCAN_DATE }}.txt
          if-no-files-found: warn
